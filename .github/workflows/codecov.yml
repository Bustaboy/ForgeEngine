name: Codecov Upload

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install coverage tool
        run: python -m pip install --upgrade pip coverage

      - name: Run tests with coverage
        run: |
          coverage run -m unittest -v tests/test_m1_skeleton.py
          coverage xml -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          name: gameforge-v1
          use_oidc: true
