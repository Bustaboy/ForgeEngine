name: Milestone 1 Skeleton Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install C++ compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y g++

      - name: Run Milestone 1 test suite
        run: python -m unittest -v tests/test_m1_skeleton.py
