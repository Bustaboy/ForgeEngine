name: ForgeEngine Release Packaging

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 0.1.0)
        required: true
        default: 0.1.0
  push:
    tags:
      - 'v*'

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: forgeengine-linux-packages
            package_cmd: ./scripts/package_ubuntu.sh
          - os: windows-latest
            artifact_name: forgeengine-windows-packages
            package_cmd: scripts/package_windows.ps1
          - os: macos-latest
            artifact_name: forgeengine-macos-packages
            package_cmd: ./scripts/package_macos.sh

    runs-on: ${{ matrix.os }}
    env:
      FORGEENGINE_VERSION: ${{ github.event.inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize version
        shell: bash
        run: |
          RAW="${FORGEENGINE_VERSION}"
          echo "FORGEENGINE_VERSION=${RAW#v}" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Ubuntu packaging deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ dpkg-dev
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Install Windows packaging deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y mingw wixtoolset

      - name: Run packaging command (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.package_cmd }}

      - name: Run packaging command (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: scripts/package_windows.ps1 -Version $env:FORGEENGINE_VERSION

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/release

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.msi
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.dmg
            dist/**/release_manifest.json
